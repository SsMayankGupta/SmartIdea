<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Volunteer | EcoConnect</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        body {
            background: #f4f9f6;
        }

        /* HEADER */
        .hero {
            background: linear-gradient(to right, #1b7f4c, #145a32);
            color: white;
            text-align: center;
            padding: 60px 20px;
        }

        .hero h1 {
            font-size: 36px;
        }

        .hero p {
            margin-top: 10px;
            font-size: 18px;
        }

        /* FORM CONTAINER */
        .form-container {
            max-width: 600px;
            background: white;
            margin: 50px auto;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.08);
        }

        .form-container h2 {
            text-align: center;
            margin-bottom: 30px;
            color: #1b7f4c;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 6px;
            font-weight: 500;
        }

        input, select, textarea {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #ccc;
            font-size: 14px;
        }

        textarea {
            resize: none;
            height: 100px;
        }

        button {
            width: 100%;
            padding: 14px;
            background: #1b7f4c;
            border: none;
            border-radius: 30px;
            color: white;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #145a32;
        }

        /* FOOTER */
        footer {
            text-align: center;
            padding: 20px;
            background: #0f5132;
            color: white;
            margin-top: 40px;
        }

        @media(max-width: 768px) {
            .form-container {
                margin: 30px 20px;
            }
        }
    </style>
</head>

<body>

    <section class="hero">
        <h1>🌱 Become a Volunteer</h1>
        <p>Join EcoConnect and help build a cleaner, greener future.</p>
    </section>

    <div class="form-container">
        <h2>Volunteer Registration Form</h2>

        <form action="#" method="post">

            <div class="form-group">
                <label>Full Name</label>
                <input type="text" placeholder="Enter your full name" required>
            </div>

            <div class="form-group">
                <label>Email Address</label>
                <input type="email" placeholder="Enter your email" required>
            </div>

            <div class="form-group">
                <label>Phone Number</label>
                <input type="tel" placeholder="Enter your phone number" required>
            </div>

            <div class="form-group">
                <label>City</label>
                <input type="text" placeholder="Enter your city" required>
            </div>

            <div class="form-group">
                <label>Area of Interest</label>
                <select required>
                    <option value="">Select an option</option>
                    <option>Tree Plantation</option>
                    <option>Clean-Up Drives</option>
                    <option>Recycling Awareness</option>
                    <option>Community Programs</option>
                </select>
            </div>

            <div class="form-group">
                <label>Why do you want to volunteer?</label>
                <textarea placeholder="Write your reason..."></textarea>
            </div>

            <button type="submit">Submit Application</button>

        </form>
    </div>

    <footer>
        © 2026 EcoConnect | Together for a Sustainable Tomorrow
    </footer>

</body>
</html>
