<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Waste Collection Request</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<section class="waste-section">
  <h2>Request Waste Pickup</h2>

  <div class="waste-card">
    <form>
      <label>Waste Type</label>
      <select>
        <option>Dry Waste</option>
        <option>Wet Waste</option>
        <option>E-Waste</option>
      </select>

      <label>Pickup Location</label>
      <input type="text" placeholder="Enter your area">

      <label>Pickup Date</label>
      <input type="date">

      <button type="submit">Submit Request</button>
    </form>
  </div>
</section>

</body>
</html>
