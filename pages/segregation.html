<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Waste Segregation Guide | EcoConnect</title>

  <!-- Google Fonts - Poppins -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="../css/style.css">
</head>
<body>

<section class="seg-section">
  <h2>Smart Waste Segregation</h2>

  <select id="item" onchange="checkWaste()">
    <option value="">Select an item</option>
    <option value="wet">Banana Peel</option>
    <option value="plastic">Plastic Bottle</option>
    <option value="ewaste">Battery</option>
  </select>

  <p id="result" style="margin-top:20px;font-weight:bold"></p>
</section>

<script>
function checkWaste() {
  const value = document.getElementById("item").value;
  const result = document.getElementById("result");

  if (value === "wet") result.innerText = "Wet Waste Bin 🍃";
  if (value === "plastic") result.innerText = "Dry / Plastic Bin ♻️";
  if (value === "ewaste") result.innerText = "E-Waste Collection 📱";
}
</script>

</body>
</html>
