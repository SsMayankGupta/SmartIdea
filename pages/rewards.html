<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Rewards | EcoConnect</title>

  <!-- Google Fonts - Montserrat & Cinzel -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="../css/style.css">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    * {
      font-family: 'Montserrat', sans-serif;
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #0b5d3b 0%, #1a8c5e 50%, #2ecc71 100%);
    }

    /* HEADER */
    header {
      background: rgba(11, 93, 59, 0.3);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(255, 255, 255, 0.2);
      padding: 15px 30px;
      position: sticky;
      top: 0;
      z-index: 1000;
    }

    .header-container {
      max-width: 1200px;
      margin: 0 auto;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .logo {
      font-family: 'Cinzel', serif;
      font-size: 24px;
      font-weight: 700;
      color: #ffffff;
      text-decoration: none;
      letter-spacing: 2px;
    }

    /* NAVIGATION */
    .nav-links {
      display: flex;
      list-style: none;
      gap: 30px;
    }

    .nav-links a {
      color: rgba(255, 255, 255, 0.9);
      text-decoration: none;
      font-weight: 500;
      font-size: 14px;
      transition: all 0.3s ease;
      position: relative;
    }

    .nav-links a:hover,
    .nav-links a.active {
      color: #ffffff;
    }

    .nav-links a::after {
      content: '';
      position: absolute;
      bottom: -4px;
      left: 0;
      width: 0;
      height: 2px;
      background: #7dffb3;
      transition: width 0.3s ease;
    }

    .nav-links a:hover::after,
    .nav-links a.active::after {
      width: 100%;
    }

    /* USER PROFILE */
    .user-profile {
      display: flex;
      align-items: center;
      gap: 15px;
      color: #ffffff;
    }

    .user-info {
      text-align: right;
    }

    .user-name {
      font-weight: 600;
      font-size: 14px;
    }

    .user-email {
      font-size: 12px;
      color: rgba(255, 255, 255, 0.7);
    }

    .user-avatar {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      background: linear-gradient(135deg, #7dffb3, #2ecc71);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      font-weight: 700;
      color: #0b5d3b;
      cursor: pointer;
    }

    .logout-btn {
      background: rgba(255, 255, 255, 0.15);
      border: 1px solid rgba(255, 255, 255, 0.3);
      color: #ffffff;
      padding: 8px 16px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .logout-btn:hover {
      background: rgba(255, 255, 255, 0.25);
    }

    /* MOBILE MENU */
    .mobile-menu-btn {
      display: none;
      background: none;
      border: none;
      color: #ffffff;
      font-size: 24px;
      cursor: pointer;
    }

    /* MAIN CONTENT */
    .rewards-section {
      max-width: 600px;
      margin: 60px auto;
      padding: 50px;
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 24px;
      text-align: center;
      color: #ffffff;
    }

    .rewards-section h1 {
      font-family: 'Cinzel', serif;
      font-size: 2.5rem;
      font-weight: 700;
      margin-bottom: 10px;
      letter-spacing: 2px;
    }

    .rewards-section .subtitle {
      color: rgba(255, 255, 255, 0.7);
      margin-bottom: 40px;
    }

    .points-display {
      font-size: 3.5rem;
      font-weight: 700;
      color: #7dffb3;
      margin: 20px 0;
    }

    .points-label {
      font-size: 14px;
      color: rgba(255, 255, 255, 0.7);
      margin-bottom: 30px;
    }

    .progress-bar {
      width: 100%;
      height: 16px;
      background: rgba(255, 255, 255, 0.2);
      border-radius: 20px;
      margin: 30px 0;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #7dffb3, #2ecc71);
      border-radius: 20px;
      transition: width 1s ease;
    }

    .level-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: linear-gradient(135deg, rgba(125, 255, 179, 0.3), rgba(46, 204, 113, 0.3));
      padding: 12px 25px;
      border-radius: 30px;
      font-weight: 600;
      font-size: 16px;
      border: 1px solid rgba(125, 255, 179, 0.4);
    }

    /* FOOTER */
    footer {
      text-align: center;
      padding: 30px;
      color: rgba(255, 255, 255, 0.6);
      font-size: 13px;
    }

    /* MOBILE RESPONSIVE */
    @media (max-width: 768px) {
      header {
        padding: 15px 20px;
      }

      .mobile-menu-btn {
        display: block;
      }

      .nav-links {
        display: none;
        position: absolute;
        top: 100%;
        left: 0;
        right: 0;
        background: rgba(11, 93, 59, 0.95);
        backdrop-filter: blur(10px);
        flex-direction: column;
        padding: 20px;
        gap: 15px;
        border-top: 1px solid rgba(255, 255, 255, 0.2);
      }

      .nav-links.active {
        display: flex;
      }

      .user-info {
        display: none;
      }

      .rewards-section {
        margin: 30px 20px;
        padding: 30px 20px;
      }

      .rewards-section h1 {
        font-size: 1.8rem;
      }

      .points-display {
        font-size: 2.5rem;
      }
    }
  </style>
</head>
<body>

<header>
  <div class="header-container">
    <a href="../index.html" class="logo">EcoConnect</a>
    
    <ul class="nav-links" id="navLinks">
      <li><a href="../index.html">Home</a></li>
      <li><a href="dashboard.html">Dashboard</a></li>
      <li><a href="rewards.html" class="active">Rewards</a></li>
    </ul>

    <div class="user-profile">
      <div class="user-info">
        <div class="user-name" id="userName">John Doe</div>
        <div class="user-email" id="userEmail">john@example.com</div>
      </div>
      <div class="user-avatar" id="userAvatar">JD</div>
      <button class="logout-btn" onclick="logout()">Logout</button>
    </div>

    <button class="mobile-menu-btn" onclick="toggleMenu()">☰</button>
  </div>
</header>

<section class="rewards-section">
  <h1>MY REWARDS</h1>
  <p class="subtitle">Track your green points and achievements</p>
  
  <div class="points-display" id="points">120</div>
  <div class="points-label">Total Green Points</div>

  <div class="progress-bar">
    <div class="progress-fill" id="progressFill" style="width: 60%"></div>
  </div>

  <div class="level-badge" id="level">🌿 Eco Warrior</div>
</section>

<footer>
  <p>&copy; 2026 EcoConnect. All rights reserved.</p>
</footer>

<script>
  function toggleMenu() {
    const navLinks = document.getElementById('navLinks');
    navLinks.classList.toggle('active');
  }

  function logout() {
    if (confirm('Are you sure you want to logout?')) {
      localStorage.removeItem('user');
      window.location.href = '../auth/login.html';
    }
  }

  function loadUserData() {
    const user = JSON.parse(localStorage.getItem('user')) || { name: 'John Doe', email: 'john@example.com' };
    document.getElementById('userName').textContent = user.name;
    document.getElementById('userEmail').textContent = user.email;
    const initials = user.name.split(' ').map(n => n[0]).join('').toUpperCase();
    document.getElementById('userAvatar').textContent = initials;
  }

  document.addEventListener('click', function(e) {
    const navLinks = document.getElementById('navLinks');
    const menuBtn = document.querySelector('.mobile-menu-btn');
    if (!navLinks.contains(e.target) && !menuBtn.contains(e.target)) {
      navLinks.classList.remove('active');
    }
  });

  document.addEventListener('DOMContentLoaded', loadUserData);
</script>

</body>
</html>
